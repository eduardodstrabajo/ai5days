name: Audit Notify

on:
  schedule:
    - cron: '0 4 * * 1' # Weekly Monday 04:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies (CI)
        run: npm ci --no-audit --prefer-offline

      - name: Run npm audit JSON
        id: run_audit
        run: |
          npm audit --json > audit.json || true
          cat audit.json

      - name: Parse audit for high/critical counts
        id: parse
        run: |
          HIGH_COUNT=$(jq '[.advisories? // {}, .vulnerabilities? // {}] | map(values) | flatten | map(.severity // ("unknown")) | map(select(. == "high" or . == "critical")) | length' audit.json || echo 0)
          echo "high_count=$HIGH_COUNT" >> $GITHUB_OUTPUT

      - name: Create issue if high/critical vulnerabilities found
        if: steps.parse.outputs.high_count != '0'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
            const body = `Automated security audit detected high/critical npm vulnerabilities (count: ${process.env.HIGH_COUNT || 'unknown'}). Please review dependencies and apply fixes or updates.\n\nAudit summary:\n\n\n
\n\n\n\n`;
            await github.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security: high/critical npm vulnerabilities detected (${new Date().toISOString().split('T')[0]})`,
              body: body
            });
