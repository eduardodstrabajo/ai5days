name: Security Audit

on:
  push:
    branches: [ development, main, master ]
  schedule:
    - cron: '0 3 * * 1' # Weekly on Monday 03:00 UTC

jobs:
  npm-audit:
    name: NPM Audit (fail on high)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies (CI)
        run: npm ci --no-audit --prefer-offline

      - name: Run npm audit (fail on >= high)
        run: |
          echo "Running npm audit (audit-level=high)"
          npm audit --audit-level=high
